en:
  views:
    product_notification_mailer:
      slot_available:
        subject: "!app_name! - New availability %{product_facility} - %{time_range}"
        body: |
          Hello %{user_name},

          Time slot %{time_range} became available for %{product} at %{facility}.

          [Make a reservation](%{new_reservation_url})
